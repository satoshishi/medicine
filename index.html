<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="服薬管理" />
  <meta name="theme-color" content="#4a90d9" />
  <title>服薬管理カレンダー</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/calendar.css" />
  <link rel="stylesheet" href="css/modal.css" />
  <link rel="stylesheet" href="css/graph.css" />

  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Vueがマウントされるまでのローディング表示 -->
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#7f8c8d;font-size:14px;">
      読み込み中...
    </div>
  </div>

  <!-- Service Worker 登録 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {
          // Service Workerが使えない環境でも動作する
        });
      });
    }
  </script>

  <!-- アプリ本体（ES Module） -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
